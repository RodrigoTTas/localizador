<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Localizador — Hora, Data & Local</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="container">
    <header class="header">
      <span class="logo">📍</span>
      <h1>Localizador</h1>
    </header>

    <section class="card card-time">
      <div class="card-icon">🕐</div>
      <p class="label">Hora Atual</p>
      <p id="hora" class="value value-big">--:--:--</p>
    </section>

    <section class="card card-date">
      <div class="card-icon">📅</div>
      <p class="label">Data</p>
      <p id="data" class="value">--/--/----</p>
      <p id="diaSemana" class="sub-value"></p>
    </section>

    <section class="card card-location">
      <div class="card-icon">🌍</div>
      <p class="label">Localização</p>
      <p id="localizacao" class="value">Obtendo localização…</p>
      <p id="coordenadas" class="sub-value"></p>
    </section>

    <footer class="footer">
      <p>Dados obtidos via geolocalização do navegador</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
